name: Dispatch due passwords

# Runs at the top of every hour (xx:00 UTC) and pings the backend so it
# delivers any passwords whose send time has passed. This also wakes the
# Render free service if it has spun down.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /cron/dispatch
        run: |
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.BACKEND_URL }}/cron/dispatch"
