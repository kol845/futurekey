# Netlify build settings. Set the site's base directory to "frontend" in the
# Netlify UI, or deploy this folder directly.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routing / refreshes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
